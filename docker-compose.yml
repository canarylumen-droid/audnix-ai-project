version: '3.8'

services:
  # --- Main API Gateway & Frontend ---
  app:
    build: .
    image: audnix-ai:latest
    container_name: audnix-app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - redis
    restart: always

  # --- Worker Service (AI / Email Sync / Outreach) ---
  worker:
    image: audnix-ai:latest
    container_name: audnix-worker
    command: ["npm", "run", "worker:prod"]
    environment:
      - NODE_ENV=production
      - ROLE=worker
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis
    restart: always

  # --- Redis for Queues (BullMQ) & Locking ---
  redis:
    image: redis:7-alpine
    container_name: audnix-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # --- Local Postgres (Optional, if not using Neon) ---
  # db:
  #   image: postgres:15-alpine
  #   container_name: audnix-db
  #   environment:
  #     - POSTGRES_DB=audnix
  #     - POSTGRES_USER=user
  #     - POSTGRES_PASSWORD=password
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data:
